<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mHub Support Center</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Production) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel pour compiler le JSX direct dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Système d'Icônes intégré (remplace l'import de lucide-react) ---
        const ICONS = {
            Plus: '<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
            Search: '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',
            AlertCircle: '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>',
            CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',
            Clock: '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',
            X: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
            MessageSquare: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>',
            LayoutDashboard: '<rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect>',
            Ticket: '<path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path>',
            Folder: '<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path>',
            Activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>',
            ChevronRight: '<polyline points="9 18 15 12 9 6"></polyline>',
            PauseCircle: '<circle cx="12" cy="12" r="10"></circle><line x1="10" y1="15" x2="10" y2="9"></line><line x1="14" y1="15" x2="14" y2="9"></line>',
            RefreshCw: '<polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>',
            AppWindow: '<rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><path d="M10 4v4"></path><path d="M2 8h20"></path><path d="M6 4v4"></path>',
            Edit2: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>',
            Save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline>'
        };

        const Icon = ({ name, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
                dangerouslySetInnerHTML={{ __html: ICONS[name] }} 
            />
        );

        // --- Constantes ---
        const PROJECTS = [
            'mAI', 'mSearch', 'Life', 'Droper', 'mBattle', 
            'BrickVerse', 'mSearch (web)', 'mAISearch', 'mAINews',
            'mWriter', 'GitHub Services', 'mCloud', 'mStudio', 
            'mAIApps', 'mAIStudio', 'Vibs', 'mStore', 'mPosts', 'Autres'
        ];

        const SOFTWARES = [
            'ChatGPT', 'xAI', 'zAI', 'mAI', 'Gemini', 'Copilot',
            'Office Microsoft', 'GitHub', 'Base44', 'Lovable', 
            'GAntigravity', 'VS Code', 'GAI Studio', 'Autres'
        ];

        const PRIORITIES = {
            'Mineur': { color: 'text-emerald-700', bg: 'bg-emerald-100', border: 'border-emerald-200' },
            'Modéré': { color: 'text-amber-700', bg: 'bg-amber-100', border: 'border-amber-200' },
            'Majeur': { color: 'text-rose-700', bg: 'bg-rose-100', border: 'border-rose-200' }
        };

        const STATUSES = {
            'Ouvert': { icon: 'AlertCircle', color: 'text-blue-600', bg: 'bg-blue-100' },
            'En cours': { icon: 'Clock', color: 'text-amber-600', bg: 'bg-amber-100' },
            'En attente': { icon: 'PauseCircle', color: 'text-purple-600', bg: 'bg-purple-100' },
            'Mise à jour': { icon: 'RefreshCw', color: 'text-indigo-600', bg: 'bg-indigo-100' },
            'Résolu': { icon: 'CheckCircle', color: 'text-emerald-600', bg: 'bg-emerald-100' }
        };

        const SHORTCUTS = [
            "En cours d'analyse 🕵️‍♂️",
            "Mise à jour établie 🔄",
            "Incident résolu ✅",
            "Incident clos 🔒",
            "Fix en cours de déploiement 🚀",
            "Besoin de plus de détails ❓",
            "Transféré à l'équipe tech 👨‍💻",
            "C'est une feature, pas un bug 😎",
            "Testé sur mOS, tout roule 🍏"
        ];

        // --- Application Principale ---
        function App() {
            const [tickets, setTickets] = useState(() => {
                const saved = localStorage.getItem('mHub_Tickets');
                return saved ? JSON.parse(saved) : [];
            });
            const [search, setSearch] = useState('');
            const [filterProject, setFilterProject] = useState('Tous');
            const [filterSoftware, setFilterSoftware] = useState('Tous');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedTicket, setSelectedTicket] = useState(null);

            useEffect(() => {
                localStorage.setItem('mHub_Tickets', JSON.stringify(tickets));
            }, [tickets]);

            const stats = useMemo(() => ({
                total: tickets.length,
                ouverts: tickets.filter(t => t.status === 'Ouvert').length,
                enCours: tickets.filter(t => t.status === 'En cours').length,
                resolus: tickets.filter(t => t.status === 'Résolu').length
            }), [tickets]);

            const filteredTickets = useMemo(() => {
                return tickets
                .filter(t => filterProject === 'Tous' || t.project === filterProject)
                .filter(t => filterSoftware === 'Tous' || (t.software || 'Autres') === filterSoftware)
                .filter(t => t.title.toLowerCase().includes(search.toLowerCase()) || t.description.toLowerCase().includes(search.toLowerCase()))
                .sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [tickets, search, filterProject, filterSoftware]);

            const addTicket = (newTicket) => {
                setTickets([{ 
                ...newTicket, 
                id: Math.random().toString(36).substr(2, 9),
                date: new Date().toISOString(),
                status: 'Ouvert',
                comments: []
                }, ...tickets]);
                setIsModalOpen(false);
            };

            const updateTicketStatus = (id, newStatus) => {
                setTickets(tickets.map(t => t.id === id ? { ...t, status: newStatus } : t));
                if (selectedTicket && selectedTicket.id === id) {
                    setSelectedTicket({ ...selectedTicket, status: newStatus });
                }
            };

            const addComment = (id, commentText) => {
                if (!commentText.trim()) return;
                const newComment = {
                id: Math.random().toString(36).substr(2, 9),
                text: commentText,
                date: new Date().toISOString()
                };
                setTickets(tickets.map(t => t.id === id ? { ...t, comments: [...t.comments, newComment] } : t));
                if (selectedTicket && selectedTicket.id === id) {
                    setSelectedTicket({ ...selectedTicket, comments: [...selectedTicket.comments, newComment] });
                }
            };

            const updateTicketDetails = (id, updates) => {
                setTickets(tickets.map(t => t.id === id ? { ...t, ...updates } : t));
                if (selectedTicket && selectedTicket.id === id) {
                    setSelectedTicket({ ...selectedTicket, ...updates });
                }
            };

            const editComment = (ticketId, commentId, newText) => {
                if (!newText.trim()) return;
                setTickets(tickets.map(t => {
                    if (t.id === ticketId) {
                        return { ...t, comments: t.comments.map(c => c.id === commentId ? { ...c, text: newText } : c) };
                    }
                    return t;
                }));
                if (selectedTicket && selectedTicket.id === ticketId) {
                    setSelectedTicket({
                        ...selectedTicket,
                        comments: selectedTicket.comments.map(c => c.id === commentId ? { ...c, text: newText } : c)
                    });
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-indigo-500/20">
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-300/40 blur-[120px] rounded-full mix-blend-multiply"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-rose-300/40 blur-[120px] rounded-full mix-blend-multiply"></div>
                    </div>

                    <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-8 h-screen">
                        
                        {/* Sidebar */}
                        <div className="w-full md:w-64 shrink-0 flex flex-col gap-6">
                            <div className="bg-white/70 backdrop-blur-xl border border-white rounded-3xl p-6 shadow-xl shadow-slate-200/50">
                                <h1 className="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-rose-500 bg-clip-text text-transparent flex items-center gap-2 mb-6">
                                    <Icon name="Activity" className="text-indigo-500" /> mHub Center
                                </h1>
                                <button onClick={() => setIsModalOpen(true)} className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/25 active:scale-95">
                                    <Icon name="Plus" size={18} /> Nouveau Ticket
                                </button>
                            </div>

                            <div className="bg-white/70 backdrop-blur-xl border border-white rounded-3xl p-6 flex-1 shadow-xl shadow-slate-200/50">
                                <h2 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                                    <Icon name="LayoutDashboard" size={16} /> Vue d'ensemble
                                </h2>
                                <div className="space-y-4">
                                    <StatCard label="Total Tickets" value={stats.total} color="text-slate-800" />
                                    <StatCard label="Ouverts" value={stats.ouverts} color="text-blue-600" />
                                    <StatCard label="En cours" value={stats.enCours} color="text-amber-600" />
                                    <StatCard label="Résolus" value={stats.resolus} color="text-emerald-600" />
                                </div>

                                <div className="mt-8">
                                    <h2 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                                        <Icon name="Folder" size={16} /> Projets
                                    </h2>
                                    <select value={filterProject} onChange={(e) => setFilterProject(e.target.value)} className="w-full bg-white border border-slate-200 rounded-xl py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 appearance-none text-slate-700 cursor-pointer shadow-sm">
                                        <option value="Tous">Tous les projets</option>
                                        {PROJECTS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>

                                <div className="mt-4">
                                    <h2 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-2">
                                        <Icon name="AppWindow" size={16} /> Logiciels
                                    </h2>
                                    <select value={filterSoftware} onChange={(e) => setFilterSoftware(e.target.value)} className="w-full bg-white border border-slate-200 rounded-xl py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 appearance-none text-slate-700 cursor-pointer shadow-sm">
                                        <option value="Tous">Tous les logiciels</option>
                                        {SOFTWARES.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {/* Main Content */}
                        <div className="flex-1 flex flex-col min-h-0 bg-white/70 backdrop-blur-xl border border-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden">
                            <div className="p-6 border-b border-slate-100 flex items-center gap-4 bg-white/50">
                                <div className="relative flex-1">
                                    <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input type="text" placeholder="Rechercher un bug, une feature..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full bg-white border border-slate-200 rounded-full py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-slate-700 placeholder-slate-400 transition-all shadow-sm" />
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                                {filteredTickets.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-400 gap-4">
                                        <Icon name="Ticket" size={48} className="opacity-50" />
                                        <p>Aucun ticket trouvé. Tout roule ! 🚀</p>
                                    </div>
                                ) : (
                                    filteredTickets.map(ticket => (
                                        <div key={ticket.id} onClick={() => setSelectedTicket(ticket)} className="group bg-white border border-slate-100 hover:border-indigo-300 hover:shadow-md rounded-2xl p-5 cursor-pointer transition-all duration-300 flex items-center gap-4">
                                            <div className={`p-3 rounded-xl ${STATUSES[ticket.status].bg} ${STATUSES[ticket.status].color}`}>
                                                <Icon name={STATUSES[ticket.status].icon} size={24} />
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex flex-wrap items-center gap-3 mb-1">
                                                    <span className="text-xs font-medium px-2.5 py-1 rounded-md bg-slate-100 text-slate-600">{ticket.project}</span>
                                                    <span className="text-xs font-medium px-2.5 py-1 rounded-md bg-indigo-50 border border-indigo-100 text-indigo-600">{ticket.software || 'Autres'}</span>
                                                    <span className={`text-xs font-semibold px-2.5 py-1 rounded-md border ${PRIORITIES[ticket.priority].bg} ${PRIORITIES[ticket.priority].color} ${PRIORITIES[ticket.priority].border}`}>{ticket.priority}</span>
                                                    <span className="text-xs text-slate-400">{new Date(ticket.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' })}</span>
                                                </div>
                                                <h3 className="text-lg font-semibold text-slate-800 truncate group-hover:text-indigo-600 transition-colors">{ticket.title}</h3>
                                            </div>
                                            <Icon name="ChevronRight" className="text-slate-400 group-hover:text-indigo-500 transition-colors" />
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {isModalOpen && <NewTicketModal onClose={() => setIsModalOpen(false)} onSubmit={addTicket} />}
                    {selectedTicket && <TicketDetailModal ticket={selectedTicket} onClose={() => setSelectedTicket(null)} onUpdateStatus={updateTicketStatus} onAddComment={addComment} onUpdateDetails={updateTicketDetails} onEditComment={editComment} />}
                </div>
            );
        }

        // --- Composants secondaires ---
        function StatCard({ label, value, color }) {
            return (
                <div className="flex items-center justify-between bg-white rounded-xl p-3 border border-slate-100 shadow-sm">
                    <span className="text-slate-500 text-sm font-medium">{label}</span>
                    <span className={`text-xl font-bold ${color}`}>{value}</span>
                </div>
            );
        }

        function NewTicketModal({ onClose, onSubmit }) {
            const [form, setForm] = useState({ title: '', description: '', project: PROJECTS[0], software: SOFTWARES[0], priority: 'Modéré' });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.title.trim() || !form.description.trim()) return;
                onSubmit(form);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                    <div className="bg-white border border-slate-100 rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
                        <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                            <h2 className="text-xl font-bold text-slate-800">Créer un Ticket</h2>
                            <button type="button" onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-full transition-colors"><Icon name="X" size={20} /></button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-600 mb-2">Titre du problème/feature</label>
                                <input autoFocus required type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 shadow-sm" placeholder="Ex: Le bot mAI répond en binaire..." />
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4">
                                <div className="flex-1">
                                    <label className="block text-sm font-medium text-slate-600 mb-2">Projet</label>
                                    <select value={form.project} onChange={e => setForm({...form, project: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 appearance-none shadow-sm">
                                        {PROJECTS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                                <div className="flex-1">
                                    <label className="block text-sm font-medium text-slate-600 mb-2">Logiciel source</label>
                                    <select value={form.software} onChange={e => setForm({...form, software: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 appearance-none shadow-sm">
                                        {SOFTWARES.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div className="flex-1">
                                    <label className="block text-sm font-medium text-slate-600 mb-2">Niveau</label>
                                    <select value={form.priority} onChange={e => setForm({...form, priority: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 appearance-none shadow-sm">
                                        {Object.keys(PRIORITIES).map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-600 mb-2">Description détaillée</label>
                                <textarea required rows="4" value={form.description} onChange={e => setForm({...form, description: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 resize-none custom-scrollbar shadow-sm" placeholder="Décris le souci ou l'idée avec un max de détails..."></textarea>
                            </div>
                            <button type="submit" className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-lg shadow-indigo-500/25 active:scale-95">
                                Lancer le ticket 🚀
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function TicketDetailModal({ ticket, onClose, onUpdateStatus, onAddComment, onUpdateDetails, onEditComment }) {
            const [commentText, setCommentText] = useState('');
            const [shortcutMenu, setShortcutMenu] = useState(null);
            const [shortcutQuery, setShortcutQuery] = useState('');

            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({ title: ticket.title, description: ticket.description });

            const [editingCommentId, setEditingCommentId] = useState(null);
            const [editCommentText, setEditCommentText] = useState('');

            useEffect(() => {
                setEditForm({ title: ticket.title, description: ticket.description });
            }, [ticket.title, ticket.description]);

            const handleSaveDetails = () => {
                onUpdateDetails(ticket.id, editForm);
                setIsEditing(false);
            };

            const handleSaveComment = (commentId) => {
                onEditComment(ticket.id, commentId, editCommentText);
                setEditingCommentId(null);
            };

            const handleComment = (e) => {
                e.preventDefault();
                onAddComment(ticket.id, commentText);
                setCommentText('');
                setShortcutMenu(null);
            };

            const handleInputChange = (e) => {
                const val = e.target.value;
                setCommentText(val);
                
                // Détecte si le dernier mot tapé commence par /, *, ou +
                const match = val.match(/(?:^|\s)([\/\*\+])([^\s]*)$/);
                if (match) {
                    setShortcutMenu(match[1]);
                    setShortcutQuery(match[2]);
                } else {
                    setShortcutMenu(null);
                }
            };

            const insertShortcut = (text) => {
                // Remplace juste le déclencheur par le texte sélectionné (pratique en milieu de phrase)
                const newVal = commentText.replace(/(?:^|\s)([\/\*\+])[^\s]*$/, (match) => {
                    return match.startsWith(' ') ? ' ' + text + ' ' : text + ' ';
                });
                setCommentText(newVal);
                setShortcutMenu(null);
            };

            let currentShortcutList = [];
            let shortcutTitle = "";
            if (shortcutMenu === '/') { currentShortcutList = SHORTCUTS; shortcutTitle = "Réponses rapides"; }
            if (shortcutMenu === '*') { currentShortcutList = SOFTWARES; shortcutTitle = "Logiciels"; }
            if (shortcutMenu === '+') { currentShortcutList = PROJECTS; shortcutTitle = "Projets"; }

            const filteredShortcuts = currentShortcutList.filter(s => s.toLowerCase().includes(shortcutQuery.toLowerCase()));

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                    <div className="bg-white border border-slate-100 rounded-3xl w-full max-w-2xl max-h-[90vh] shadow-2xl overflow-hidden flex flex-col animate-in fade-in zoom-in duration-200">
                        <div className="p-6 border-b border-slate-100 flex items-start justify-between bg-slate-50 relative group">
                            <div className="flex-1 pr-12">
                                <div className="flex flex-wrap items-center gap-3 mb-3">
                                    <span className="text-xs font-medium px-2.5 py-1 rounded-md bg-white border border-slate-200 text-slate-600 shadow-sm">{ticket.project}</span>
                                    <span className="text-xs font-medium px-2.5 py-1 rounded-md bg-indigo-50 border border-indigo-100 text-indigo-600 shadow-sm flex items-center gap-1">
                                        <Icon name="AppWindow" size={12} /> {ticket.software || 'Autres'}
                                    </span>
                                    <span className={`text-xs font-semibold px-2.5 py-1 rounded-md border ${PRIORITIES[ticket.priority].bg} ${PRIORITIES[ticket.priority].color} ${PRIORITIES[ticket.priority].border}`}>{ticket.priority}</span>
                                    <span className={`text-xs font-semibold px-2.5 py-1 rounded-md border flex items-center gap-1 bg-white shadow-sm ${STATUSES[ticket.status].color}`}>
                                        <Icon name={STATUSES[ticket.status].icon} size={12} /> {ticket.status}
                                    </span>
                                </div>
                                
                                {isEditing ? (
                                    <input 
                                        type="text" 
                                        value={editForm.title} 
                                        onChange={e => setEditForm({...editForm, title: e.target.value})}
                                        className="w-full text-2xl font-bold text-slate-800 bg-white border border-indigo-300 rounded-lg px-3 py-1 mb-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm"
                                    />
                                ) : (
                                    <h2 className="text-2xl font-bold text-slate-800 leading-tight pr-8">{ticket.title}</h2>
                                )}
                                <p className="text-xs text-slate-500 mt-2">Ouvert le {new Date(ticket.date).toLocaleString('fr-FR', { dateStyle: 'long', timeStyle: 'short' })}</p>
                            </div>

                            <div className="absolute top-6 right-16 flex gap-2">
                                {isEditing ? (
                                    <button onClick={handleSaveDetails} className="p-2 bg-indigo-500 text-white hover:bg-indigo-600 rounded-full transition-colors shadow-md flex items-center gap-1 text-xs pr-3">
                                        <Icon name="Save" size={16} /> Sauver
                                    </button>
                                ) : (
                                    <button onClick={() => setIsEditing(true)} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors opacity-0 group-hover:opacity-100" title="Modifier le ticket">
                                        <Icon name="Edit2" size={18} />
                                    </button>
                                )}
                            </div>

                            <button onClick={onClose} className="p-2 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-full transition-colors shrink-0 absolute top-6 right-6"><Icon name="X" size={20} /></button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 custom-scrollbar space-y-8 bg-white">
                            <div className="flex flex-wrap gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100">
                                {Object.keys(STATUSES).map(status => (
                                    <button key={status} onClick={() => onUpdateStatus(ticket.id, status)} className={`flex-1 min-w-[100px] py-2 text-sm font-medium rounded-lg transition-all ${ticket.status === status ? 'bg-white text-indigo-600 shadow border border-slate-200' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-200'}`}>
                                        {status}
                                    </button>
                                ))}
                            </div>

                            <div>
                                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Description</h3>
                                {isEditing ? (
                                    <textarea 
                                        rows="5"
                                        value={editForm.description}
                                        onChange={e => setEditForm({...editForm, description: e.target.value})}
                                        className="w-full bg-slate-50 border border-indigo-300 rounded-2xl p-5 text-slate-800 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm"
                                    />
                                ) : (
                                    <div className="bg-slate-50 border border-slate-100 rounded-2xl p-5 text-slate-700 whitespace-pre-wrap leading-relaxed shadow-inner">
                                        {ticket.description}
                                    </div>
                                )}
                            </div>

                            <div>
                                <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                                    <Icon name="MessageSquare" size={16} /> Journal & Notes ({ticket.comments?.length || 0})
                                </h3>
                                
                                <div className="space-y-4 mb-6">
                                    {ticket.comments?.map(comment => (
                                        <div key={comment.id} className="group/comment bg-white border border-slate-100 shadow-sm rounded-2xl p-4 relative">
                                            {editingCommentId === comment.id ? (
                                                <div className="flex flex-col gap-2 mt-1">
                                                    <textarea 
                                                        value={editCommentText}
                                                        onChange={e => setEditCommentText(e.target.value)}
                                                        className="w-full bg-slate-50 border border-indigo-300 rounded-xl p-3 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 custom-scrollbar"
                                                        rows="2"
                                                    />
                                                    <div className="flex justify-end gap-2">
                                                        <button onClick={() => setEditingCommentId(null)} className="px-3 py-1.5 text-xs font-medium text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">Annuler</button>
                                                        <button onClick={() => handleSaveComment(comment.id)} className="px-3 py-1.5 text-xs font-medium bg-indigo-500 text-white hover:bg-indigo-600 rounded-lg shadow-sm transition-colors">Sauver</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <>
                                                    <p className="text-sm text-slate-700 pr-8 whitespace-pre-wrap">{comment.text}</p>
                                                    <p className="text-xs text-slate-400 mt-2">{new Date(comment.date).toLocaleString('fr-FR')}</p>
                                                    <button 
                                                        onClick={() => { setEditingCommentId(comment.id); setEditCommentText(comment.text); }}
                                                        className="absolute top-3 right-3 p-1.5 text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 rounded-lg opacity-0 group-hover/comment:opacity-100 transition-all"
                                                        title="Modifier la note"
                                                    >
                                                        <Icon name="Edit2" size={16} />
                                                    </button>
                                                </>
                                            )}
                                        </div>
                                    ))}
                                    {(!ticket.comments || ticket.comments.length === 0) && (
                                        <p className="text-sm text-slate-400 italic">Aucune note pour le moment.</p>
                                    )}
                                </div>

                                <div className="relative">
                                    {shortcutMenu && filteredShortcuts.length > 0 && (
                                        <div className="absolute bottom-full left-0 w-full mb-2 bg-white border border-slate-200 rounded-xl shadow-lg shadow-slate-200/50 overflow-hidden z-10">
                                            <div className="px-3 py-2 bg-slate-50 border-b border-slate-100 text-xs font-semibold text-slate-400 uppercase tracking-wider">{shortcutTitle}</div>
                                            <div className="max-h-48 overflow-y-auto custom-scrollbar">
                                                {filteredShortcuts.map((shortcut, idx) => (
                                                    <button key={idx} type="button" onClick={() => insertShortcut(shortcut)} className="w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                                                        {shortcut}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <form onSubmit={handleComment} className="flex gap-3">
                                        <input type="text" value={commentText} onChange={handleInputChange} placeholder="Tape '/' (phrases), '*' (logiciels) ou '+' (projets)..." className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-slate-800 shadow-sm" />
                                        <button type="submit" className="bg-slate-800 hover:bg-slate-700 text-white px-5 rounded-xl transition-all font-medium text-sm shadow-md">Envoyer</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Rendu ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
